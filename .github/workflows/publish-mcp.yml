name: Publish dev953-mcp

# On a version tag (vX.Y.Z): publish the companion to npm + the MCP Registry,
# build the .mcpb bundle and a source zip, and attach both to the GitHub release.
# The server is zero-dependency Node, so there is no install/build step.
# Idempotent: npm/registry publish is skipped when the version is already on npm;
# the release artifacts are always (re)built and uploaded.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC: proves this repo is under GRU-953 -> may publish io.github.GRU-953/*
      contents: write # create/update the GitHub release and upload assets
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: https://registry.npmjs.org

      - name: Resolve version (from manifest)
        id: ver
        run: |
          VER="$(jq -r .version mcp/package.json)"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VER"

      - name: Verify versions agree with the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SJ="$(jq -r .version server.json)"
          PK="$(jq -r .version mcp/package.json)"
          MF="$(jq -r .version mcp/manifest.json)"
          echo "tag=$TAG server.json=$SJ package.json=$PK manifest.json=$MF"
          test "$TAG" = "$SJ" && test "$TAG" = "$PK" && test "$TAG" = "$MF"

      - name: Syntax-check the server
        run: node --check mcp/server.mjs

      # ---- npm + MCP Registry (idempotent: skip if this version is already on npm) ----
      - name: Check whether this version is already on npm
        id: check
        run: |
          VER="${{ steps.ver.outputs.version }}"
          if npm view "dev953-mcp@${VER}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "dev953-mcp@${VER} already on npm — skipping npm/registry publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package to npm
        if: steps.check.outputs.already_published != 'true'
        working-directory: mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        if: steps.check.outputs.already_published != 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        if: steps.check.outputs.already_published != 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        if: steps.check.outputs.already_published != 'true'
        run: ./mcp-publisher publish

      # ---- release artifacts (.mcpb + source zip): always (re)built and attached ----
      - name: Build .mcpb bundle
        run: |
          VER="${{ steps.ver.outputs.version }}"
          rm -rf build && mkdir build
          cp mcp/manifest.json mcp/server.mjs mcp/README.md build/
          npx -y @anthropic-ai/mcpb@latest pack build "dev953-${VER}.mcpb"

      - name: Build source archive
        run: |
          VER="${{ steps.ver.outputs.version }}"
          git archive --format=zip -o "dev953-${VER}-source.zip" HEAD

      - name: Attach artifacts to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          TAG="v${VER}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "dev953-${VER}.mcpb" "dev953-${VER}-source.zip" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "dev953-${VER}.mcpb" "dev953-${VER}-source.zip" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi
